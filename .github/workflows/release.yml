name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find CI run for this commit
        id: find-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA=$(git rev-list -1 ${{ github.ref_name }})
          echo "Looking for CI artifacts from commit $COMMIT_SHA"

          # Wait up to 10 minutes for CI to complete
          for i in $(seq 1 20); do
            RUN=$(gh api "/repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=$COMMIT_SHA&status=completed&per_page=1" \
              --jq '.workflow_runs[0] | {id, conclusion}')
            RUN_ID=$(echo "$RUN" | jq -r '.id // empty')
            CONCLUSION=$(echo "$RUN" | jq -r '.conclusion // empty')

            if [ -n "$RUN_ID" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
                echo "Found successful CI run: $RUN_ID"
                exit 0
              else
                echo "CI run $RUN_ID finished with: $CONCLUSION"
                exit 1
              fi
            fi
            echo "Waiting for CI to complete... (attempt $i/20)"
            sleep 30
          done
          echo "Timed out waiting for CI run"
          exit 1

      - name: Download artifacts from CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh run download ${{ steps.find-run.outputs.run_id }} --dir artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.blockmap" -o -name "latest*.yml" \) -exec cp {} release-files/ \;
          echo "Files to release:"
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MatSlop ${{ github.ref_name }}
          generate_release_notes: true
          files: release-files/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

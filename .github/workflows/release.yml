name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build:win
            artifact_pattern: 'release/*.exe'
            artifact_name: windows-artifacts
          - os: ubuntu-latest
            build_cmd: npm run build:linux
            artifact_pattern: |
              release/*.AppImage
              release/*.deb
            artifact_name: linux-artifacts
          - os: macos-latest
            build_cmd: npm run build:mac
            artifact_pattern: 'release/*.dmg'
            artifact_name: macos-artifacts

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run --exclude tests/integration/publish-html-integration.test.ts

      - name: Download Octave
        run: node scripts/download-octave.js
        continue-on-error: true
        timeout-minutes: 15

      - name: Build
        run: electron-vite build && npx electron-builder ${{ matrix.os == 'windows-latest' && '--win' || matrix.os == 'ubuntu-latest' && '--linux' || '--mac' }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

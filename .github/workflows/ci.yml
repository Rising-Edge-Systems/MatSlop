name: CI

on:
  push:
    branches: ['**']
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run --exclude tests/integration/publish-html-integration.test.ts

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_flag: --win
          - os: ubuntu-latest
            platform_flag: --linux
          - os: macos-latest
            platform_flag: --mac --arm64 --x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev rpm fakeroot

      # Caches electron-builder's downloaded helper binaries (winCodeSign,
      # nsis-resources, Squirrel.Mac, appimage runtime, etc.) across runs so
      # we don't depend on GitHub's CDN staying up every time we tag.
      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron-builder
            ~/Library/Caches/electron-builder
            ~\AppData\Local\electron-builder\Cache
          key: electron-builder-${{ runner.os }}

      - name: Build sources
        run: npx electron-vite build

      # Retried because the cold-cache run on a fresh runner still has to
      # fetch winCodeSign / appimage-runtime from github.com, which
      # intermittently returns 502. Once the cache above is warm, the retry
      # is effectively a no-op.
      - name: Package & Publish
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 30
          command: npx electron-builder ${{ matrix.platform_flag }} --publish onTag
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

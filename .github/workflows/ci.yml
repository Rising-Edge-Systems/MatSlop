name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run --exclude tests/integration/publish-html-integration.test.ts

  build:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_flag: --win
            artifact_name: windows-installer
            artifact_glob: |
              release/*.exe
              release/*.blockmap
              release/latest.yml
          - os: ubuntu-latest
            platform_flag: --linux
            artifact_name: linux-installer
            artifact_glob: |
              release/*.AppImage
              release/*.deb
              release/latest-linux.yml
          - os: macos-latest
            platform_flag: --mac
            artifact_name: macos-installer
            artifact_glob: |
              release/*.dmg
              release/*.zip
              release/latest-mac.yml

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev rpm fakeroot

      - name: Download Octave
        run: node scripts/download-octave.js
        timeout-minutes: 15

      - name: Verify Octave bundled
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            test -f resources/octave/mingw64/bin/octave-cli.exe && echo "Octave found" || (echo "ERROR: Octave not bundled!" && exit 1)
          elif [ "$RUNNER_OS" = "Linux" ]; then
            test -f resources/octave/usr/bin/octave-cli && echo "Octave found" || (echo "ERROR: Octave not bundled!" && exit 1)
          elif [ "$RUNNER_OS" = "macOS" ]; then
            test -d resources/octave/Octave.app && echo "Octave found" || (echo "ERROR: Octave not bundled!" && exit 1)
          fi

      - name: Build
        run: npx electron-vite build && npx electron-builder ${{ matrix.platform_flag }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 7
